<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Food</label>
    <input list="food">
    <datalist id="food">
        <option value="apple">
        <option value="pineapple">
        <option value="mango">
    </datalist>
    <label>Location</label>
    <input list="city">
    <datalist id="city ">
        <option value="hyderabad">
        <option value="delhi">
        <option value="chennai">
    </datalist>
</body>
</html>
